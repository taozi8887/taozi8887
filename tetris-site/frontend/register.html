<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Taotris</title>
  <link rel="stylesheet" href="style.css">
  <script src="cursor.js" defer></script>
  <style>
    .password-rules {
      font-size: .75rem; color: var(--text3); margin-top: -.5rem;
    }
    .rule { display: flex; gap: .4rem; align-items: center; }
    .rule.ok  { color: var(--accent); }
    .rule.bad { color: var(--text3); }
  </style>
</head>
<body>

<div class="auth-page">
  <a class="nav-logo" href="index.html">Taotris</a>

  <div class="auth-card">
    <h2 class="auth-title">Create account</h2>

    <div id="errBox" class="form-error hidden" style="margin-bottom: 5px;"></div>

    <!-- Registration form -->
    <form id="regForm" class="form-group" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" class="input" type="text" autocomplete="username"
               required minlength="3" maxlength="20" placeholder="username"
               pattern="[a-zA-Z0-9_\-]+">
        <span class="small muted" id="usernameHint">3–20 chars, letters/numbers/_ and -</span>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" class="input" type="email" autocomplete="email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" class="input" type="password" autocomplete="new-password" required placeholder="••••••••">
        <div class="password-rules" id="pwRules">
          <div class="rule" id="ruleLen" style="padding-top: 4px;">· At least 8 characters</div>
        </div>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input id="confirm" class="input" type="password" autocomplete="new-password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn primary" id="submitBtn">Create account</button>
    </form>

    <!-- Email verification notice (shown after successful registration) -->
    <div id="verifyNotice" class="hidden" style="text-align:center;padding:1rem 0;">
      <div style="font-size:2.5rem;margin-bottom:.75rem;">&#9993;</div>
      <h3 style="margin:0 0 .5rem;">Check your inbox</h3>
      <p class="muted" style="font-size:.85rem;margin:0 0 1rem;">We sent a verification link to <strong id="verifyEmail"></strong>.<br>Click it to activate your account, then sign in.</p>
      <a href="login.html" class="btn primary" style="width:100%;">Go to Sign In</a>
      <p class="muted" style="font-size:.75rem;margin-top:.75rem;">Didn&rsquo;t get an email? Check your spam folder.</p>
    </div>
  </div>

  <p class="auth-footer">
    Already have an account? <a href="login.html">Sign in</a>
  </p>
</div>

<script type="module">
  import API from './api.js';

  // Redirect if already logged in
  (async () => {
    try { await API.auth.me(); location.href = 'index.html'; } catch {}
  })();

  const form      = document.getElementById('regForm');
  const errBox    = document.getElementById('errBox');
  const submitBtn = document.getElementById('submitBtn');
  const pwInput   = document.getElementById('password');
  const ruleLen   = document.getElementById('ruleLen');

  pwInput.addEventListener('input', () => {
    ruleLen.className = 'rule ' + (pwInput.value.length >= 8 ? 'ok' : 'bad');
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = pwInput.value;
    const confirm  = document.getElementById('confirm').value;

    if (!username || !email || !password) { showErr('Please fill in all fields.'); return; }
    if (!/^[a-zA-Z0-9_\-]{3,20}$/.test(username)) { showErr('Username must be 3–20 chars, letters/numbers/_ or -.'); return; }
    if (password.length < 8) { showErr('Password must be at least 8 characters.'); return; }
    if (password !== confirm) { showErr('Passwords do not match.'); return; }

    submitBtn.disabled    = true;
    submitBtn.textContent = 'Creating account…';
    errBox.classList.add('hidden');

    try {
      const data = await API.auth.register({ username, email, password });
      if (data?.needsVerification) {
        // Show email verification notice
        document.getElementById('regForm').classList.add('hidden');
        document.getElementById('verifyEmail').textContent = email;
        document.getElementById('verifyNotice').classList.remove('hidden');
        document.querySelector('.auth-title').textContent = 'Verify your email';
      } else {
        // Legacy path (email already confirmed, e.g. admin flow)
        const redir = new URLSearchParams(location.search).get('redir') || 'profile.html';
        location.href = redir;
      }
    } catch (err) {
      showErr(err.message || 'Registration failed.');
      submitBtn.disabled    = false;
      submitBtn.textContent = 'Create account';
    }
  });

  function showErr(msg) {
    errBox.textContent = msg;
    errBox.classList.remove('hidden');
  }
</script>
</body>
</html>
